; PlatformIO Project Configuration File
;
; Build/upload the Pocket Demo V3 sketch for the Teensy 4.0.
;
; The sketch is kept in its Arduino-IDE folder (Pocket_Demo_V3/) so it stays
; openable in the Arduino IDE; `src_dir` below points PlatformIO at that folder
; instead of the default `src/`.
;
;   pio run                 build
;   pio run -t upload       build + flash the Teensy
;   pio device monitor      open the serial monitor

[platformio]
default_envs = teensy40
src_dir = Pocket_Demo_V3

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200
; Use the headless command-line loader so uploads don't require the
; Teensy Loader GUI app to be open.
upload_protocol = teensy-cli
